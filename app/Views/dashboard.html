<section class="dashboard-shell">
  <header class="dashboard-heading">
    <div>
      <h1>Your sprites</h1>
    </div>
    <form class="inline-form" method="post" action="/sprites">
      <input type="hidden" name="csrf_token" value="{{ @csrfToken }}">
      <button class="button button-primary" type="submit">Create sprite</button>
    </form>
  </header>

  <check if="{{ @hasSprites }}">
    <true>
      <div class="sprite-list">
        <repeat group="{{ @sprites }}" value="{{ @sprite }}">
          <article class="sprite-row">
            <div class="sprite-row-main">
              <span class="sprite-row-preview" aria-hidden="true">
                <check if="{{ @sprite.preview_symbol_markup && @sprite.preview_view_box }}">
                  <svg viewBox="{{ @sprite.preview_view_box }}">{{ @sprite.preview_symbol_markup | raw }}</svg>
                </check>
              </span>
              <div class="sprite-row-copy">
                <h2>{{ @sprite.name }}</h2>
                <p>{{ @sprite.icon_count }} icons &middot; {{ @sprite.output_mode }} &middot; updated {{ @sprite.updated_at }}</p>
              </div>
            </div>
            <div class="row-actions">
              <a class="button button-primary-outline" href="/sprites/{{ @sprite.id }}">Open</a>
              <a class="button button-secondary" href="/api/sprites/{{ @sprite.id }}.svg">Download</a>
              <form method="post" action="/sprites/{{ @sprite.id }}/delete" onsubmit="return confirm('Delete this saved sprite?');">
                <input type="hidden" name="csrf_token" value="{{ @csrfToken }}">
                <button class="button button-secondary" type="submit">Delete</button>
              </form>
            </div>
          </article>
        </repeat>
      </div>
    </true>
    <false>
      <div class="empty-state dashboard-empty">
        <p>No saved sprites yet</p>
      </div>
    </false>
  </check>
</section>
