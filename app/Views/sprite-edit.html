<section class="editor-shell" data-sprite-editor data-sprite-id="{{ @sprite.id }}" data-csrf="{{ @csrfToken }}">
  <header class="editor-heading">
    <div>
      <h1>{{ @sprite.name }}</h1>
    </div>
    <div class="tool-actions">
      <a class="button button-primary" href="/api/sprites/{{ @sprite.id }}.svg" data-download-sprite>Download</a>
      <button class="button button-secondary" type="button" data-copy-saved-sprite data-copy-label="Copy">Copy</button>
      <form class="inline-form" method="post" action="/sprites/{{ @sprite.id }}/delete" onsubmit="return confirm('Delete this sprite? This cannot be undone.');">
        <input type="hidden" name="csrf_token" value="{{ @csrfToken }}">
        <button class="button button-secondary" type="submit">Delete</button>
      </form>
    </div>
  </header>

  <div class="editor-workflow">
    <section class="editor-panel editor-panel-compact upload-panel">
      <label class="dropzone" data-saved-dropzone>
        <input type="file" accept=".svg,image/svg+xml" multiple data-saved-file-input aria-label="Choose SVG files">
        <strong>Drop SVGs here to add icons</strong>
        <span>or choose files</span>
      </label>
      <div class="status-line" data-saved-status aria-live="polite"></div>
    </section>

    <section class="editor-panel editor-panel-compact settings-panel" aria-labelledby="sprite-settings-title">
      <form class="metadata-form" method="post" action="/sprites/{{ @sprite.id }}">
        <h2 id="sprite-settings-title">Settings</h2>
        <input type="hidden" name="csrf_token" value="{{ @csrfToken }}">
        <div class="form-grid">
          <label>
            <span>Name</span>
            <input name="name" value="{{ @sprite.name }}" required maxlength="120">
          </label>
          <label>
            <span>File name</span>
            <input name="slug" value="{{ @sprite.slug }}" maxlength="140">
          </label>
          <label>
            <span>Format</span>
            <select name="output_mode">
              <option value="pretty" <check if="{{ @sprite.output_mode=='pretty' }}">selected</check>>Pretty</option>
              <option value="minified" <check if="{{ @sprite.output_mode=='minified' }}">selected</check>>Minified</option>
            </select>
          </label>
          <label class="span-2">
            <span>Description</span>
            <input name="description" value="{{ @sprite.description }}" maxlength="500">
          </label>
        </div>
        <button class="button button-primary-outline" type="submit">Save settings</button>
      </form>
    </section>
  </div>

  <section class="editor-panel icons-panel">
    <div class="tool-header">
      <div>
        <h2>Icons</h2>
        <p>{{ count(@icons) }} icons</p>
      </div>
      <button class="button button-primary button-small save-icon-changes" type="button" data-save-icon-changes hidden>
        Save ID changes
      </button>
    </div>

    <check if="{{ count(@icons) }}">
      <true>
        <div class="saved-icon-grid">
          <repeat group="{{ @icons }}" value="{{ @icon }}">
            <include href="partials/icon-card.html" />
          </repeat>
        </div>
        <div class="icon-grid-footer">
          <button class="button button-primary button-small save-icon-changes" type="button" data-save-icon-changes hidden>
            Save ID changes
          </button>
        </div>
      </true>
      <false>
        <div class="empty-state">
          <p>No icons yet</p>
        </div>
      </false>
    </check>
  </section>
</section>
